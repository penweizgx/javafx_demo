navigation:
  # 首页 - 全局导航项，始终显示
  - id: home
    label: 首页
    labelKey: nav.home
    path: /home
    fxml: /fxml/home.fxml
    icon: home
    expanded: true
    options:
      cacheable: true
      singleton: true
      closable: false

  # 系统管理模块
  - id: system
    label: 系统
    labelKey: nav.system
    icon: settings
    expanded: true
    children:
      # 系统配置 - 系统模块第一项
      - id: system-config
        label: 系统配置
        labelKey: nav.system.config
        path: /system/config
        fxml: /fxml/system_config.fxml
        icon: settings
        options:
          cacheable: true
          closable: true
      - id: employee-mgmt
        label: 员工管理
        labelKey: nav.employee.mgmt
        children:
          # 员工列表 - 功能页面，在导航栏显示
          - id: employee-list
            label: 员工列表
            labelKey: nav.employee.list
            path: /system/employee/list
            fxml: /fxml/employee_list.fxml
            icon: user-list
            options:
              cacheable: true
              closable: true
          # 用户详情 - 页面内部元素，不在导航栏显示
          # 通过用户列表点击进入，支持Tab切换
          - id: user-detail
            label: 用户详情
            labelKey: nav.user.detail
            path: /system/user/detail/:id
            fxml: /fxml/user_detail.fxml
            icon: user-detail
            showInNav: false  # 不在导航栏显示
            options:
              cacheable: false
              supportsSubPage: true
            children:
              # 页面内部Tab项，不在导航栏显示
              - id: user-basic
                label: 基本信息
                labelKey: nav.user.basic
                tabId: basic
                showInNav: false  # Tab项不在导航栏显示
              - id: user-history
                label: 操作记录
                labelKey: nav.user.history
                tabId: history
                showInNav: false  # Tab项不在导航栏显示
              - id: user-permission
                label: 权限设置
                labelKey: nav.user.permission
                tabId: permission
                showInNav: false  # Tab项不在导航栏显示
          # 新增用户 - 页面内操作，不在导航栏显示
          - id: user-create
            label: 新增用户
            labelKey: nav.user.create
            path: /system/user/create
            fxml: /fxml/user_form.fxml
            showInNav: false  # 页面内操作元素
            options:
              singleton: true
              confirmLeave: true
      - id: role-mgmt
        label: 角色管理
        labelKey: nav.role.mgmt
        children:
          - id: role-list
            label: 角色列表
            labelKey: nav.role.list
            path: /system/role/list
            fxml: /fxml/role_list.fxml

  # 业务模块
  - id: business
    label: 业务
    labelKey: nav.business
    icon: business
    children:
      - id: form-demo
        label: 表单示例
        labelKey: nav.form.demo
        path: /form
        fxml: /fxml/form.fxml
        icon: form
        options:
          cacheable: true
      - id: list-demo
        label: 列表示例
        labelKey: nav.list.demo
        path: /list
        fxml: /fxml/list.fxml
        icon: list
        options:
          cacheable: true

quickAccess:
  header:
    - id: pending
      label: 待审批
      labelKey: quick.pending
      icon: bell
      path: /workflow/pending
      showBadge: true
      badgeSource: "${pendingCount}"
    - id: my-profile
      label: 我的资料
      labelKey: quick.profile
      icon: user
      path: /system/user/detail/:id
      params:
        userId: "${currentUserId}"

  dashboard:
    - id: todo
      label: 待办事项
      labelKey: dashboard.todo
      path: /workflow/todo
    - id: sales
      label: 销售概览
      labelKey: dashboard.sales
      path: /report/sales