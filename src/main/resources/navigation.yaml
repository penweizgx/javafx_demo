navigation:
  - id: home
    label: 首页
    labelKey: nav.home
    path: /home
    fxml: /fxml/home.fxml
    icon: home
    expanded: true
    options:
      cacheable: true
      singleton: true
      closable: false

  - id: system
    label: 系统
    labelKey: nav.system
    icon: settings
    expanded: true
    children:
      - id: system-config
        label: 系统配置
        labelKey: nav.system.config
        path: /system/config
        fxml: /fxml/system_config.fxml
        icon: settings
        options:
          cacheable: true
          closable: true

  - id: employee-mgmt
    label: 员工管理
    labelKey: nav.employee.mgmt
    icon: user-list
    expanded: true
    children:
      - id: employee-list
        label: 员工列表
        labelKey: nav.employee.list
        path: /system/employee/list
        fxml: /fxml/employee_list.fxml
        icon: user-list
        options:
          cacheable: true
          closable: true
      - id: employee-detail
        label: 员工详情
        labelKey: nav.employee.detail
        path: /system/employee/detail/:id
        fxml: /fxml/employee_detail.fxml
        showInNav: false
        options:
          cacheable: false
          closable: true
      - id: user-detail
        label: 用户详情
        labelKey: nav.user.detail
        path: /system/user/detail/:id
        fxml: /fxml/user_detail.fxml
        icon: user-detail
        showInNav: false
        options:
          cacheable: false
          supportsSubPage: true
        children:
          - id: user-basic
            label: 基本信息
            labelKey: nav.user.basic
            tabId: basic
            showInNav: false
          - id: user-history
            label: 操作记录
            labelKey: nav.user.history
            tabId: history
            showInNav: false
          - id: user-permission
            label: 权限设置
            labelKey: nav.user.permission
            tabId: permission
            showInNav: false
      - id: user-create
        label: 新增用户
        labelKey: nav.user.create
        path: /system/user/create
        fxml: /fxml/user_form.fxml
        showInNav: false
        options:
          singleton: true
          confirmLeave: true

  - id: student-mgmt
    label: 学生管理
    labelKey: nav.student.mgmt
    icon: graduation-cap
    expanded: true
    path: /student/classes
    fxml: /fxml/student_classes.fxml
    options:
      cacheable: true
      closable: true
    children:
      - id: student-list
        label: 班级学生
        labelKey: nav.student.list
        path: /student/class/:clazzId
        fxml: /fxml/student_list.fxml
        showInNav: false
      - id: student-detail
        label: 学生详情
        labelKey: nav.student.detail
        path: /student/detail/:id
        fxml: /fxml/student_detail.fxml
        showInNav: false

  - id: role-mgmt
    label: 角色管理
    labelKey: nav.role.mgmt
    icon: shield
    expanded: true
    children:
      - id: role-list
        label: 角色列表
        labelKey: nav.role.list
        path: /system/role/list
        fxml: /fxml/role_list.fxml

  - id: api-monitor
    label: API监控
    labelKey: nav.api.monitor
    path: /system/api-monitor
    fxml: /fxml/api_monitor.fxml
    icon: activity
    options:
      cacheable: true
      closable: true

quickAccess:
  header:
    - id: pending
      label: 待审批
      labelKey: quick.pending
      icon: bell
      path: /workflow/pending
      showBadge: true
      badgeSource: "${pendingCount}"
    - id: my-profile
      label: 我的资料
      labelKey: quick.profile
      icon: user
      path: /system/user/detail/:id
      params:
        userId: "${currentUserId}"

  dashboard:
    - id: todo
      label: 待办事项
      labelKey: dashboard.todo
      path: /workflow/todo
    - id: sales
      label: 销售概览
      labelKey: dashboard.sales
      path: /report/sales
